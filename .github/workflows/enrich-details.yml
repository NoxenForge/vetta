name: Enrich Details (Hourly)

on:
  schedule:
    # 每小时执行一次 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger enrich-details job
        run: |
          curl -f -X GET "https://vetta-ten-omega.vercel.app/api/jobs/enrich-details?secret=vetta_cron_secret_2026"
